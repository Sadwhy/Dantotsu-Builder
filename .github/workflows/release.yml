name: Build a Release

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: 'rebelonion/Dantotsu'
          ref: 'dev'
          fetch-depth: 0
          
      - name: Download last SHA artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: release.yml
          name: last-sha
          path: .
        continue-on-error: true

      - name: Get Commits Since Last Run
        run: |
          if [ -f last_sha.txt ]; then
            LAST_SHA=$(cat last_sha.txt)
          else
            # Fallback to first commit if no previous SHA available
            LAST_SHA=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Commits since $LAST_SHA:"
      
          # Accumulate commit logs in a shell variable with conditional formatting
          COMMIT_LOGS=$(git log $LAST_SHA..HEAD --pretty=format:"%s ~%an" | while read -r line; do
            PR_NUMBER=$(echo "$line" | grep -oE '#[0-9]+')
            if [ -n "$PR_NUMBER" ]; then
              PR_NUMBER=${PR_NUMBER#\#} # Remove the # symbol
              FORMATTED_LINE=$(echo "$line" | sed -E "s/#$PR_NUMBER/([#${PR_NUMBER}](https:\/\/github.com\/rebelonion\/Dantotsu\/pull\/${PR_NUMBER}))/g")
            else
              COMMIT_HASH=$(git log -1 --pretty=format:"%h" --grep="$line")
              FORMATTED_LINE="$line ([${COMMIT_HASH}](https://github.com/rebelonion/Dantotsu/commit/${COMMIT_HASH}))"
            fi
            echo "● $FORMATTED_LINE"
          done)
      
          # URL-encode the newline characters for GitHub Actions
          COMMIT_LOGS="${COMMIT_LOGS//'%'/'%25'}"
          COMMIT_LOGS="${COMMIT_LOGS//$'\n'/'%0A'}"
          COMMIT_LOGS="${COMMIT_LOGS//$'\r'/'%0D'}"
          
          # Append the encoded commit logs to the COMMIT_LOG environment variable
          echo "COMMIT_LOG=${COMMIT_LOGS}" >> $GITHUB_ENV
        shell: /usr/bin/bash -e {0}
        env:
          CI: true
        continue-on-error: true

      - name: Save Current SHA for Next Run
        run: echo ${{ github.sha }} > last_sha.txt

      - name: Fetch version name
        run: |
          VER=$(grep -E -o "versionName \".*\"" app/build.gradle | sed -e 's/versionName //g' | tr -d '"')
          COMMIT_HASH=$(git rev-parse --short HEAD)
          VERSION="$VER+$COMMIT_HASH"
          echo "Version $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update app version
        run: |
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" app/build.gradle

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle
  
      - name: Decode Keystore File
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > $GITHUB_WORKSPACE/key.keystore
  
      - name: List files in the directory
        run: ls -l
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew assembleFdroidRelease

      - name: Move APK and calculate checksum
        run: |
          mv app/build/outputs/apk/fdroid/release/app-fdroid-release.apk release-fdroid-${{ env.VERSION }}.apk
          echo "FDROID=$(sha256sum release-fdroid-${{ env.VERSION }}.apk | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dantotsu
          retention-days: 5
          path: "release-fdroid-${{ env.VERSION }}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Dantotsu ${{ env.VERSION }}
          body: |
            New ${{ env.VERSION }} build has arrived.
            ---
            Commits: 
            ${{ env.COMMIT_LOG }}
            
            ### Checksums

            | Variant | SHA-256 |
            | ------- | ------- |
            | Fdroid Build | ${{ env.FDROID }}
          files: release-fdroid-${{ env.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          keep_latest: 28
          delete_tags: true
